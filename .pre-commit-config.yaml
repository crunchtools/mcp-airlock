repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        files: \.py$
        stages: [pre-commit, pre-merge-commit]
      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        files: \.py$
        stages: [pre-commit, pre-merge-commit]
      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-merge-commit]
